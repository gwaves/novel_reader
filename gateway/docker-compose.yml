services:
  gateway:
    build:
      context: .
    container_name: novel-reader-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-6180}:6180"
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 6180
      GATEWAY_PUBLIC_BASE_URL: ${GATEWAY_PUBLIC_BASE_URL:-http://127.0.0.1:6180}
      GATEWAY_ENV: ${GATEWAY_ENV:-production}
      GATEWAY_LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-info}
      GATEWAY_DATA_DIR: /data
      GATEWAY_AUDIO_DIR: /audio
      GATEWAY_MAX_BODY_BYTES: ${GATEWAY_MAX_BODY_BYTES:-52428800}
      GATEWAY_DEV_ACCESS_TOKEN: ${GATEWAY_DEV_ACCESS_TOKEN:?set GATEWAY_DEV_ACCESS_TOKEN}
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS:-}
      GATEWAY_RATE_LIMIT_MAX: ${GATEWAY_RATE_LIMIT_MAX:-120}
      GATEWAY_RATE_LIMIT_WINDOW: ${GATEWAY_RATE_LIMIT_WINDOW:-1 minute}
      GATEWAY_AI_BASE_URL: ${GATEWAY_AI_BASE_URL:-}
      GATEWAY_AI_API_KEY: ${GATEWAY_AI_API_KEY:-}
      GATEWAY_AI_MODEL: ${GATEWAY_AI_MODEL:-}
      GATEWAY_EMBEDDING_PROVIDER: ${GATEWAY_EMBEDDING_PROVIDER:-openai-compatible}
      GATEWAY_EMBEDDING_BASE_URL: ${GATEWAY_EMBEDDING_BASE_URL:-}
      GATEWAY_EMBEDDING_API_KEY: ${GATEWAY_EMBEDDING_API_KEY:-}
      GATEWAY_EMBEDDING_MODEL: ${GATEWAY_EMBEDDING_MODEL:-}
      GATEWAY_UPSTREAM_TIMEOUT_MS: ${GATEWAY_UPSTREAM_TIMEOUT_MS:-60000}
    volumes:
      - ./data:/data
      - ./audio:/audio:ro
